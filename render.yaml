services:
  - type: web
    name: genlayer-intelligent-contract-auditor
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
